  :root {
    --bright: #9fe870;     /* Wise bright green */
    --forest: #163300;     /* Wise forest green */
    --ink: #163300;
    --paper: #ffffff;
    --card: #f7f9f5;
    --line: #e4e9df;
    --muted: #5c6b54;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  body {
    font-family: "Poppins", ui-sans-serif, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-weight: 500;
    background: var(--paper);
    color: var(--ink);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: max(5vh, env(safe-area-inset-top)) 20px calc(40px + env(safe-area-inset-bottom));
  }
  .wrap { width: 100%; max-width: 440px; }

  header { margin-bottom: 28px; }
  .eyebrow {
    font-size: 0.78rem; letter-spacing: 0; text-transform: none;
    color: var(--muted); font-weight: 500;
  }
  h1 {
    font-size: 2.6rem; font-weight: 700; letter-spacing: -0.035em; margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }

  .bill {
    background: var(--card);
    border: none;
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 18px;
  }
  .bill-label {
    font-size: 0.82rem; letter-spacing: 0; text-transform: none;
    color: var(--muted); font-weight: 500; margin-bottom: 6px;
  }
  .bill-amount {
    font-size: 2.8rem; font-weight: 700; letter-spacing: -0.04em;
    font-variant-numeric: tabular-nums; display: flex; align-items: baseline; gap: 3px;
  }
  .bill-amount .cur { font-size: 1.7rem; color: var(--ink); font-weight: 700; }
  .bill-amount.empty { color: #c2cdb9; }

  .pad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 26px;
  }
  .key {
    background: var(--card);
    border: none;
    border-radius: 16px;
    font-size: 1.5rem; font-weight: 700;
    padding: 20px 0;
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.06s ease, background 0.12s ease;
    font-variant-numeric: tabular-nums;
  }
  .key:active { transform: scale(0.95); background: var(--bright); }
  .key.del { color: var(--muted); font-size: 1.2rem; }

  .section-label {
    font-size: 0.82rem; letter-spacing: 0; text-transform: none;
    color: var(--muted); font-weight: 500; margin-bottom: 10px;
  }
  .tips {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px;
  }
  .tip {
    background: var(--card); border: none; border-radius: 14px;
    padding: 15px 0; font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: all 0.12s ease; font-variant-numeric: tabular-nums; color: var(--ink);
  }
  .tip:active { transform: scale(0.96); }
  .tip.on {
    background: var(--bright); color: var(--forest);
  }

  .split {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border: none; border-radius: 16px;
    padding: 16px 20px; margin-bottom: 14px;
  }
  .split-name { font-weight: 700; }
  .split-name span { display: block; font-size: 0.78rem; color: var(--muted); font-weight: 500; }
  .stepper { display: flex; align-items: center; gap: 16px; }
  .step-btn {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: var(--paper); font-size: 1.4rem; font-weight: 700; cursor: pointer;
    display: grid; place-items: center; color: var(--forest);
    box-shadow: inset 0 0 0 2px var(--line);
  }
  .step-btn:active { background: var(--bright); box-shadow: none; }
  .step-count { font-size: 1.3rem; font-weight: 700; min-width: 24px; text-align: center; font-variant-numeric: tabular-nums; }

  /* Rounding toggle */
  .round {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border: none; border-radius: 16px;
    padding: 16px 20px; margin-bottom: 26px;
  }
  .round-name { font-weight: 700; }
  .round-name span { display: block; font-size: 0.78rem; color: var(--muted); font-weight: 500; }
  .seg { display: flex; gap: 6px; }
  .seg-btn {
    border: none; background: var(--paper); border-radius: 12px;
    padding: 10px 15px; font-size: 0.9rem; font-weight: 700; cursor: pointer; color: var(--muted);
    transition: all 0.12s ease; box-shadow: inset 0 0 0 2px var(--line);
  }
  .seg-btn:active { transform: scale(0.95); }
  .seg-btn.on { background: var(--bright); color: var(--forest); box-shadow: none; }

  .result {
    background: var(--forest); color: var(--paper); border-radius: 20px; padding: 24px;
  }
  .result-row { display: flex; justify-content: space-between; align-items: baseline; }
  .result-row + .result-row { margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(159,232,112,0.25); }
  .result-key { font-size: 0.85rem; letter-spacing: 0; text-transform: none; color: rgba(255,255,255,0.7); font-weight: 500; }
  .result-val { font-size: 1.35rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .result-row.total .result-key { color: var(--bright); }
  .result-row.total .result-val { font-size: 2.1rem; letter-spacing: -0.03em; color: var(--bright); }
  .per { font-size: 0.78rem; color: rgba(255,255,255,0.6); font-weight: 500; }

  @media (max-width: 360px) {
    .key { padding: 15px 0; font-size: 1.3rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Quick split</div>
    <h1>Tip</h1>
  </header>

  <div class="bill">
    <div class="bill-label">Bill amount</div>
    <div class="bill-amount empty" id="billDisplay"><span class="cur">€</span><span id="billNum">0,00</span></div>
  </div>

  <div class="pad" id="pad">
    <button class="key" data-k="1">1</button>
    <button class="key" data-k="2">2</button>
    <button class="key" data-k="3">3</button>
    <button class="key" data-k="4">4</button>
    <button class="key" data-k="5">5</button>
    <button class="key" data-k="6">6</button>
    <button class="key" data-k="7">7</button>
    <button class="key" data-k="8">8</button>
    <button class="key" data-k="9">9</button>
    <button class="key" data-k="c">C</button>
    <button class="key" data-k="0">0</button>
    <button class="key del" data-k="del">⌫</button>
  </div>

  <div class="section-label">Tip</div>
  <div class="tips" id="tips">
    <button class="tip" data-tip="5">5%</button>
    <button class="tip on" data-tip="10">10%</button>
    <button class="tip" data-tip="15">15%</button>
    <button class="tip" data-tip="20">20%</button>
  </div>

  <div class="split">
    <div class="split-name">Split<span>between people</span></div>
    <div class="stepper">
      <button class="step-btn" id="minus">−</button>
      <div class="step-count" id="people">1</div>
      <button class="step-btn" id="plus">+</button>
    </div>
  </div>

  <div class="round">
    <div class="round-name">Round total<span>after tip</span></div>
    <div class="seg" id="roundSeg">
      <button class="seg-btn on" data-round="off">Off</button>
      <button class="seg-btn" data-round="down">↓</button>
      <button class="seg-btn" data-round="up">↑</button>
    </div>
  </div>

  <div class="result">
    <div class="result-row">
      <div class="result-key">Tip</div>
      <div class="result-val" id="tipAmt">€0,00</div>
    </div>
    <div class="result-row" id="tipSplitRow" style="display:none;">
      <div class="result-key">Tip each</div>
      <div class="result-val" id="tipSplit">€0,00</div>
    </div>
    <div class="result-row total">
      <div>
        <div class="result-key">Total</div>
        <div class="per" id="perPerson"></div>
      </div>
      <div class="result-val" id="totalAmt">€0,00</div>
    </div>
  </div>
</div>

<script>
  let cents = 0;
  let tipPct = 10;
  let people = 1;
  let roundMode = 'off';   // 'off' | 'up' | 'down'

  const billNum = document.getElementById('billNum');
  const billDisplay = document.getElementById('billDisplay');
  const tipAmt = document.getElementById('tipAmt');
  const totalAmt = document.getElementById('totalAmt');
  const peopleEl = document.getElementById('people');
  const perPerson = document.getElementById('perPerson');
  const tipSplitRow = document.getElementById('tipSplitRow');
  const tipSplit = document.getElementById('tipSplit');

  const money = n => '€' + n.toFixed(2).replace('.', ',');

  function render() {
    const bill = cents / 100;
    billNum.textContent = bill.toFixed(2).replace('.', ',');
    billDisplay.classList.toggle('empty', cents === 0);

    let tip = bill * tipPct / 100;
    let total = bill + tip;

    // Round the whole total up/down to a round euro, adjust tip to absorb it
    if (roundMode === 'up') total = Math.ceil(total);
    else if (roundMode === 'down') total = Math.floor(total);
    if (roundMode !== 'off') tip = Math.max(0, total - bill);

    tipAmt.textContent = money(tip);
    totalAmt.textContent = money(total);
    perPerson.textContent = people > 1 ? money(total / people) + ' each' : '';

    if (people > 1) {
      tipSplitRow.style.display = '';
      tipSplit.textContent = money(tip / people);
    } else {
      tipSplitRow.style.display = 'none';
    }
  }

  document.getElementById('pad').addEventListener('click', e => {
    const k = e.target.dataset.k;
    if (!k) return;
    if (k === 'c') cents = 0;
    else if (k === 'del') cents = Math.floor(cents / 10);
    else cents = Math.min(cents * 10 + parseInt(k), 99999999);
    render();
  });

  document.getElementById('tips').addEventListener('click', e => {
    const t = e.target.dataset.tip;
    if (!t) return;
    tipPct = parseInt(t);
    document.querySelectorAll('.tip').forEach(b => b.classList.toggle('on', b === e.target));
    render();
  });

  document.getElementById('plus').addEventListener('click', () => { people = Math.min(people + 1, 50); peopleEl.textContent = people; render(); });
  document.getElementById('minus').addEventListener('click', () => { people = Math.max(people - 1, 1); peopleEl.textContent = people; render(); });

  document.getElementById('roundSeg').addEventListener('click', e => {
    const r = e.target.dataset.round;
    if (!r) return;
    roundMode = r;
    document.querySelectorAll('#roundSeg .seg-btn').forEach(b => b.classList.toggle('on', b === e.target));
    render();
  });

  render();

  if ('serviceWorker' in navigator) {
    const swCode = `
      const C='tipapp-v1';
      self.addEventListener('install',e=>{self.skipWaiting();});
      self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim());});
      self.addEventListener('fetch',e=>{
        if(e.request.method!=='GET')return;
        e.respondWith(
          caches.open(C).then(c=>
            c.match(e.request).then(hit=>
              hit || fetch(e.request).then(res=>{c.put(e.request,res.clone());return res;})
                .catch(()=>c.match('./'))
            )
          )
        );
      });`;
    const blob = new Blob([swCode], {type:'text/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).then(()=>{
      // pre-cache this page
      if (navigator.serviceWorker.controller) return;
    }).catch(()=>{});
    // Cache the current page explicitly once loaded
    window.addEventListener('load',()=>{
      if ('caches' in window) {
        caches.open('tipapp-v1').then(c=>c.add(location.href).catch(()=>{}));
      }
    });
  }

</script>
</body>
</html>
